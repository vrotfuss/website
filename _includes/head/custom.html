<!-- start custom head snippets -->

<!-- define Content Security Policy and Referrer Policy -->
<META HTTP-EQUIV='Content-Security-Policy' CONTENT="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self'; media-src 'self'; frame-src 'self'; font-src 'self'; base-uri 'self'; form-action 'none';">
<META HTTP-EQUIV='Referrer-Policy' CONTENT="no-referrer">

<!-- define favicons -->
<link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
<link rel="manifest" href="/assets/favicon/site.webmanifest">
<link rel="mask-icon" href="/assets/favicon/safari-pinned-tab.svg" color="#5bbad5">
<link rel="shortcut icon" href="/assets/favicon/favicon.ico">
<meta name="msapplication-TileColor" content="#da532c">
<meta name="msapplication-config" content="/assets/favicon/browserconfig.xml">
<meta name="theme-color" content="#ffffff">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ site.title | escape }}",
  "url": "{{ site.url }}",
  "inLanguage": "de-DE"
}
</script>

{% if page.url == "/" or page.url == "/kontakt/" or page.url == "/traumatherapie-muenchen/" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Veronika Rotfuß",
  "jobTitle": "Heilpraktikerin für Psychotherapie",
  "url": "{{ site.url }}",
  "image": "{{ site.url }}/assets/images/bio-photo.jpg",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "Grillparzerstraße 23",
    "postalCode": "81675",
    "addressLocality": "München",
    "addressCountry": "DE"
  },
  "email": "praxis@veronikarotfuss.de",
  "telephone": "+49-170-1140994",
  "areaServed": "München"
}
</script>
{% endif %}

{% if page.url != "/" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Startseite",
      "item": "{{ site.url }}/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.title | escape }}",
      "item": "{{ site.url }}{{ page.url }}"
    }
  ]
}
</script>
{% endif %}

{% if page.layout == "post" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ page.title | escape }}",
  "image": ["{{ site.url }}{{ page.image | default: '/assets/images/Sonne_farbiger_Hintergrund_heller.jpg' }}"],
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  "author": {
    "@type": "Person",
    "name": "Veronika Rotfuß"
  },
  "publisher": {
    "@type": "Person",
    "name": "Veronika Rotfuß"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ site.url }}{{ page.url }}"
  },
  "description": "{{ page.excerpt | default: site.description | strip_html | strip_newlines | escape }}"
}
</script>
{% endif %}

<!-- end custom head snippets -->
